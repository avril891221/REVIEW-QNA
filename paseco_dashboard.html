<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PASECO 리뷰 & QNA 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --primary:#1a56db;--primary-light:#ebf0ff;
    --positive:#0e9f6e;--positive-light:#e6f9f0;
    --negative:#e02424;--negative-light:#fde8e8;
    --neutral:#6b7280;--neutral-light:#f3f4f6;
    --qna:#7e3af2;--qna-light:#f3eeff;
    --border:#e5e7eb;--text:#111827;--text-sub:#6b7280;
    --bg:#f8fafc;--warning:#d97706;
    --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.04);
    --shadow-lg:0 8px 32px rgba(0,0,0,.10);
    --radius:16px;--radius-sm:10px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  header{background:white;border-bottom:1px solid var(--border);padding:0 40px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06);}
  .header-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:64px;}
  .logo{display:flex;align-items:center;gap:12px;}
  .logo-badge{width:36px;height:36px;background:var(--primary);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;color:white;font-size:15px;}
  .logo-text{font-size:18px;font-weight:700;}
  .logo-sub{font-size:13px;color:var(--text-sub);}
  .update-badge{font-size:12px;color:var(--text-sub);background:var(--neutral-light);padding:4px 14px;border-radius:20px;}
  main{max-width:1400px;margin:0 auto;padding:32px 40px;}
  .tabs{display:flex;gap:4px;background:white;padding:6px;border-radius:12px;border:1px solid var(--border);width:fit-content;margin-bottom:28px;box-shadow:var(--shadow);flex-wrap:wrap;}
  .tab-btn{padding:8px 22px;border-radius:8px;border:none;background:none;font-size:14px;font-weight:600;cursor:pointer;color:var(--text-sub);transition:.2s;font-family:inherit;}
  .tab-btn.active{background:var(--primary);color:white;box-shadow:0 2px 8px rgba(26,86,219,.3);}
  .tab-btn:hover:not(.active){background:var(--primary-light);color:var(--primary);}
  .kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:28px;}
  .kpi-card{background:white;border-radius:var(--radius);padding:22px 20px;border:1px solid var(--border);box-shadow:var(--shadow);display:flex;flex-direction:column;gap:8px;transition:.2s;}
  .kpi-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);}
  .kpi-label{font-size:11px;font-weight:700;color:var(--text-sub);text-transform:uppercase;letter-spacing:.6px;}
  .kpi-value{font-size:34px;font-weight:800;line-height:1;}
  .c-blue{color:var(--primary);}.c-green{color:var(--positive);}.c-red{color:var(--negative);}.c-purple{color:var(--qna);}.c-yellow{color:var(--warning);}
  .kpi-sub{font-size:12px;color:var(--text-sub);}
  .kpi-bar{height:4px;border-radius:4px;background:var(--border);margin-top:4px;overflow:hidden;}
  .kpi-bar-fill{height:100%;border-radius:4px;}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
  .grid-3{display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-bottom:20px;}
  .card{background:white;border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;}
  .card-header{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .card-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;}
  .card-body{padding:20px 22px;}
  .chart-wrap{position:relative;height:220px;}
  .tbl{width:100%;border-collapse:collapse;font-size:13px;}
  .tbl th{text-align:left;padding:10px 14px;font-size:11px;font-weight:700;color:var(--text-sub);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--border);background:var(--bg);}
  .tbl td{padding:12px 14px;border-bottom:1px solid var(--border);vertical-align:middle;}
  .tbl tr:hover td{background:var(--bg);}
  .tbl tr:last-child td{border-bottom:none;}
  .pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;gap:3px;}
  .p-pos{background:var(--positive-light);color:var(--positive);}.p-neg{background:var(--negative-light);color:var(--negative);}.p-neu{background:var(--neutral-light);color:var(--neutral);}.p-qna{background:var(--qna-light);color:var(--qna);}.p-blue{background:var(--primary-light);color:var(--primary);}
  .mbar-wrap{display:flex;align-items:center;gap:8px;font-size:12px;}
  .mbar{flex:1;height:6px;border-radius:6px;background:var(--border);overflow:hidden;}
  .mbar-fill{height:100%;border-radius:6px;}
  .r-list{display:flex;flex-direction:column;gap:12px;}
  .r-item{padding:14px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);transition:.15s;background:white;}
  .r-item:hover{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-light);}
  .r-item.neg{border-left:3px solid var(--negative);}.r-item.pos{border-left:3px solid var(--positive);}.r-item.qna{border-left:3px solid var(--qna);}
  .r-meta{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
  .r-author{font-size:13px;font-weight:600;}.r-date{font-size:11px;color:var(--text-sub);}
  .r-prod{font-size:11px;font-weight:600;background:var(--primary-light);color:var(--primary);padding:2px 8px;border-radius:20px;}
  .r-content{font-size:13px;line-height:1.7;color:#374151;white-space:pre-wrap;}
  .q-q{font-size:13px;font-weight:600;margin-bottom:8px;line-height:1.7;white-space:pre-wrap;}
  .q-a{font-size:12px;color:var(--text-sub);padding-left:12px;border-left:2px solid var(--border);margin-top:8px;line-height:1.7;white-space:pre-wrap;}
  .fbar{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
  .fsel,.sinput{padding:8px 14px;border-radius:8px;border:1px solid var(--border);font-size:13px;background:white;font-family:inherit;color:var(--text);}
  .sinput{width:260px;}
  .fsel:focus,.sinput:focus{outline:none;border-color:var(--primary);}
  .sec-title{font-size:13px;font-weight:700;color:var(--text-sub);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
  .sec-title::after{content:'';flex:1;height:1px;background:var(--border);}
  .tab-content{display:none;}.tab-content.active{display:block;}
  .empty{text-align:center;padding:40px;color:var(--text-sub);font-size:14px;}
  .raw-toggle{cursor:pointer;font-size:12px;color:var(--primary);font-weight:600;margin-top:10px;display:inline-block;}
  .raw-box{display:none;margin-top:10px;padding:12px;border:1px dashed var(--border);border-radius:8px;background:#fcfdff;font-size:12px;line-height:1.6;white-space:pre-wrap;color:#374151;}
  @media(max-width:1100px){.kpi-grid{grid-template-columns:repeat(3,1fr);}}
  @media(max-width:800px){main{padding:20px;}.kpi-grid{grid-template-columns:repeat(2,1fr);}.grid-2,.grid-3{grid-template-columns:1fr;}header{padding:0 20px;}}
</style>
</head>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-badge">P</div>
      <div><div class="logo-text">PASECO 리뷰 대시보드</div><div class="logo-sub">리뷰 &amp; QNA 통합 분석</div></div>
    </div>
    <div class="update-badge">🕐 2026-04-01 17:19 기준</div>
  </div>
</header>

<main>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('overview',this)">📊 전체 현황</button>
    <button class="tab-btn" onclick="switchTab('products',this)">📦 제품별 분석</button>
    <button class="tab-btn" onclick="switchTab('reviews',this)">⭐ 리뷰 목록</button>
    <button class="tab-btn" onclick="switchTab('qna',this)">💬 QNA 목록</button>
  </div>

  <div id="tab-overview" class="tab-content active">
    <div class="kpi-grid" id="kpi-grid"></div>
    <div class="grid-2">

      <div class="card"><div class="card-header"><div class="card-title">⭐ 별점 분포</div><span class="pill p-blue">전체</span></div><div class="card-body"><div class="chart-wrap"><canvas id="ratingChart"></canvas></div></div></div>
    </div>
    <div class="grid-3">
      <div class="card"><div class="card-header"><div class="card-title">📦 제품별 리뷰 수</div></div><div class="card-body"><div class="chart-wrap" style="height:260px"><canvas id="productChart"></canvas></div></div></div>
      <div class="card"><div class="card-header"><div class="card-title">💬 QNA 답변 현황</div><span class="pill p-qna">QNA</span></div><div class="card-body"><div class="chart-wrap"><canvas id="qnaChart"></canvas></div></div></div>
    </div>
    <div class="sec-title">🚨 최근 부정 리뷰 (최신 10건)</div>
    <div class="r-list" id="recent-neg"></div>
  </div>

  <div id="tab-products" class="tab-content">
    <div class="card">
      <div class="card-header"><div class="card-title">📊 제품별 상세 지표</div></div>
      <div style="overflow-x:auto;"><table class="tbl"><thead><tr><th>제품명</th><th>리뷰 수</th><th>평균 별점</th><th>긍정률</th><th>부정률</th><th>QNA 수</th><th>답변완료</th><th>최근 리뷰일</th></tr></thead><tbody id="prod-tbody"></tbody></table></div>
    </div>
    <div style="margin-top:20px;"><div class="sec-title">📈 제품별 평균 별점</div><div class="card"><div class="card-body"><div class="chart-wrap" style="height:300px"><canvas id="prodRatingChart"></canvas></div></div></div></div>
  </div>

  <div id="tab-reviews" class="tab-content">
    <div class="fbar">
      <select class="fsel" id="f-prod" onchange="renderReviews()"><option value="">전체 제품</option></select>
      <select class="fsel" id="f-sent" onchange="renderReviews()"><option value="">전체 감성</option><option value="긍정">😊 긍정</option><option value="부정">😞 부정</option><option value="중립">😐 중립</option></select>
      <select class="fsel" id="f-rat" onchange="renderReviews()"><option value="">전체 별점</option><option value="5">⭐⭐⭐⭐⭐ 5점</option><option value="4">⭐⭐⭐⭐ 4점</option><option value="3">⭐⭐⭐ 3점</option><option value="2">⭐⭐ 2점</option><option value="1">⭐ 1점</option></select>
      <input class="sinput" id="s-rev" placeholder="🔍 리뷰 내용 검색..." oninput="renderReviews()">
      <span id="rev-count" style="font-size:13px;color:var(--text-sub);margin-left:auto;"></span>
    </div>
    <div class="r-list" id="rev-list"></div>
  </div>

  <div id="tab-qna" class="tab-content">
    <div class="fbar">
      <select class="fsel" id="f-qprod" onchange="renderQna()"><option value="">전체 제품</option></select>
      <select class="fsel" id="f-ans" onchange="renderQna()"><option value="">전체</option><option value="답변완료">✅ 답변완료</option><option value="미답변">⏳ 미답변</option></select>
      <input class="sinput" id="s-qna" placeholder="🔍 질문 / 답변 검색..." oninput="renderQna()">
      <span id="qna-count" style="font-size:13px;color:var(--text-sub);margin-left:auto;"></span>
    </div>
    <div class="r-list" id="qna-list"></div>
  </div>
</main>

function pickDateValue(v) {
  return String(v || '').trim();
}

function sortByDateDesc(arr) {
  return [...arr].sort((a, b) => pickDateValue(b['작성일']).localeCompare(pickDateValue(a['작성일'])));
}

function renderKPI() {

  ].join('');
}

const kpi = (l,v,c,s,p,col) => `<div class="kpi-card"><div class="kpi-label">${esc(l)}</div><div class="kpi-value ${c}">${esc(v)}</div><div class="kpi-sub">${esc(s)}</div><div class="kpi-bar"><div class="kpi-bar-fill" style="width:${Math.min(p,100)}%;background:${col}"></div></div></div>`;

function renderCharts() {
  const pos = reviews.filter(r => r['감성'] === '긍정').length;
  const neg = reviews.filter(r => r['감성'] === '부정').length;
  const neu = reviews.filter(r => r['감성'] === '중립').length;
  mk('sentimentChart','doughnut',['긍정','부정','중립'],[pos,neg,neu],['#0e9f6e','#e02424','#9ca3af'],{cutout:'65%'});

  const rCnts = [5,4,3,2,1].map(s => reviews.filter(r => parseInt(r['별점']) === s).length);
  mk('ratingChart','bar',['5점','4점','3점','2점','1점'],rCnts,['#0e9f6e','#34d399','#f59e0b','#fb923c','#e02424']);

  const prods = [...new Set(RAW.map(r => r['제품명']).filter(Boolean))];
  const pCnts = prods.map(p => reviews.filter(r => r['제품명'] === p).length);
  mk('productChart','bar',prods,pCnts,Array(prods.length).fill('#1a56db'),{indexAxis:'y'});

  const ans = qnas.filter(q => q['답변여부'] === '답변완료').length;
  mk('qnaChart','doughnut',['답변완료','미답변'],[ans, Math.max(0, qnas.length - ans)],['#7e3af2','#ddd6fe'],{cutout:'65%'});

  const avgRs = prods.map(p => {
    const pr = reviews.filter(r => r['제품명'] === p && r['별점'] && parseFloat(r['별점']) > 0);
    return pr.length ? (pr.reduce((s,r)=>s+(parseFloat(r['별점'])||0),0) / pr.length).toFixed(2) : 0;
  });
  mk('prodRatingChart','bar',prods,avgRs,avgRs.map(v=>v>=4?'#0e9f6e':v>=3?'#f59e0b':'#e02424'));
}

function mk(id,type,labels,data,colors,extra={}) {
  const ctx = document.getElementById(id);
  if (!ctx) return;
  if (charts[id]) charts[id].destroy();
  charts[id] = new Chart(ctx, {
    type,
    data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: type==='doughnut'?2:0, borderRadius: type==='bar'?6:0, barThickness: 22 }] },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: type==='doughnut', position:'right', labels:{ font:{size:12}, padding:12 } } },
      scales: type==='bar' ? {
        x: { grid: {display:false}, ticks: {font: {size:11}} },
        y: { grid: {color:'#f3f4f6'}, ticks: {font: {size:11}}, beginAtZero: true }
      } : undefined,
      ...extra
    }
  });
}

function renderProductTable() {
  const prods = [...new Set(RAW.map(r => r['제품명']).filter(Boolean))].sort();
  document.getElementById('prod-tbody').innerHTML = prods.map(p => {
    const pr = reviews.filter(r => r['제품명'] === p);
    const pq = qnas.filter(q => q['제품명'] === p);
    const rats = pr.map(r => parseFloat(r['별점'])).filter(n => !isNaN(n) && n > 0);
    const avg = rats.length ? (rats.reduce((a,b)=>a+b,0)/rats.length).toFixed(1) : '—';
    const pos = pr.filter(r => r['감성'] === '긍정').length;
    const neg = pr.filter(r => r['감성'] === '부정').length;
    const posR = pr.length ? Math.round(pos / pr.length * 100) : 0;
    const negR = pr.length ? Math.round(neg / pr.length * 100) : 0;
    const ans = pq.filter(q => q['답변여부'] === '답변완료').length;
    const last = sortByDateDesc(pr)[0]?.['작성일'] || '—';
    const stars = avg !== '—' ? '⭐'.repeat(Math.min(5, Math.round(parseFloat(avg)))) : '';
    return `<tr>
      <td><strong>${esc(p)}</strong></td>
      <td><span class="pill p-blue">${pr.length}건</span></td>
      <td>${stars} <strong>${esc(avg)}</strong></td>
      <td><div class="mbar-wrap"><span style="color:var(--positive);font-weight:600">${posR}%</span><div class="mbar"><div class="mbar-fill" style="width:${posR}%;background:var(--positive)"></div></div></div></td>
      <td><div class="mbar-wrap"><span style="color:var(--negative);font-weight:600">${negR}%</span><div class="mbar"><div class="mbar-fill" style="width:${negR}%;background:var(--negative)"></div></div></div></td>
      <td><span class="pill p-qna">${pq.length}건</span></td>
      <td><span class="pill ${ans ? 'p-pos' : 'p-neu'}">${ans}건</span></td>
      <td style="font-size:12px;color:var(--text-sub)">${esc(last)}</td>
    </tr>`;
  }).join('');
}

function populateFilters() {
  const prods = [...new Set(RAW.map(r => r['제품명']).filter(Boolean))].sort();
  ['f-prod', 'f-qprod'].forEach(id => {
    const sel = document.getElementById(id);
    prods.forEach(p => {
      const o = document.createElement('option');
      o.value = o.textContent = p;
      sel.appendChild(o);
    });
  });
}

function toggleRaw(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.display = el.style.display === 'block' ? 'none' : 'block';
}

function renderReviews() {
  const prod = document.getElementById('f-prod').value;
  const sent = document.getElementById('f-sent').value;
  const rat = document.getElementById('f-rat').value;
  const q = document.getElementById('s-rev').value.toLowerCase();

  const filtered = sortByDateDesc(reviews).filter(r => {
    if (prod && r['제품명'] !== prod) return false;
    if (sent && r['감성'] !== sent) return false;
    if (rat && String(parseInt(r['별점'] || 0)) !== rat) return false;
    const text = `${r['리뷰내용'] || ''} ${r['작성자'] || ''} ${r['제품명'] || ''}`.toLowerCase();
    if (q && !text.includes(q)) return false;
    return true;
  });

  document.getElementById('rev-count').textContent = `총 ${filtered.length}건`;
  const list = document.getElementById('rev-list');
  if (!filtered.length) {
    list.innerHTML = '<div class="empty">😔 조건에 맞는 리뷰가 없습니다</div>';
    return;
  }

  list.innerHTML = filtered.slice(0, 200).map((r, idx) => {
    const s = r['감성'] || '—';
    const cls = s === '부정' ? 'neg' : s === '긍정' ? 'pos' : '';
    const pc = s === '긍정' ? 'p-pos' : s === '부정' ? 'p-neg' : 'p-neu';
    const em = s === '긍정' ? '😊' : s === '부정' ? '😞' : '😐';
    const stars = '⭐'.repeat(Math.min(5, parseInt(r['별점']) || 0));
    const link = r['링크'] || '';
    const rawId = `raw-review-${idx}`;
    return `<div class="r-item ${cls}">
      <div class="r-meta">
        <span class="r-prod">${esc(r['제품명'] || '')}</span>
        <span class="r-author">${esc(r['작성자'] || '익명')}</span>
        <span class="r-date">${esc(r['작성일'] || '')}</span>
        <span style="color:#d97706;font-size:13px">${stars}</span>
        <span class="pill ${pc}">${em} ${esc(s)}</span>
        ${link ? `<a href="${esc(link)}" target="_blank" rel="noopener noreferrer" style="font-size:11px;color:var(--primary);text-decoration:none;margin-left:auto">🔗 원문</a>` : ''}
      </div>
      <div class="r-content">${esc(r['리뷰내용'] || '내용 없음')}</div>
      <span class="raw-toggle" onclick="toggleRaw('${rawId}')">원본 데이터 보기</span>
      <div class="raw-box" id="${rawId}">${esc(JSON.stringify(r['원본'] || {}, null, 2))}</div>
    </div>`;
  }).join('') + (filtered.length > 200 ? `<div class="empty" style="padding:16px">상위 200건 표시 중 (전체 ${filtered.length}건)</div>` : '');
}

function renderRecentNeg() {
  const neg = sortByDateDesc(reviews.filter(r => r['감성'] === '부정')).slice(0, 10);
  const el = document.getElementById('recent-neg');
  if (!neg.length) {
    el.innerHTML = '<div class="empty">😊 부정 리뷰가 없습니다</div>';
    return;
  }
  el.innerHTML = neg.map(r => {
    const link = r['링크'] || '';
    const stars = '⭐'.repeat(Math.min(5, parseInt(r['별점']) || 0));
    return `<div class="r-item neg">
      <div class="r-meta">
        <span class="r-prod">${esc(r['제품명'] || '')}</span>
        <span class="r-author">${esc(r['작성자'] || '익명')}</span>
        <span class="r-date">${esc(r['작성일'] || '')}</span>
        <span style="color:#d97706">${stars}</span>
        <span class="pill p-neg">😞 부정</span>
        ${link ? `<a href="${esc(link)}" target="_blank" rel="noopener noreferrer" style="font-size:11px;color:var(--primary);text-decoration:none;margin-left:auto">🔗 원문</a>` : ''}
      </div>
      <div class="r-content">${esc(r['리뷰내용'] || '')}</div>
    </div>`;
  }).join('');
}

function renderQna() {
  const prod = document.getElementById('f-qprod').value;
  const ans = document.getElementById('f-ans').value;
  const q = document.getElementById('s-qna').value.toLowerCase();

  const filtered = sortByDateDesc(qnas).filter(r => {
    if (prod && r['제품명'] !== prod) return false;
    const isA = r['답변여부'] === '답변완료';
    if (ans === '답변완료' && !isA) return false;
    if (ans === '미답변' && isA) return false;
    const text = `${r['리뷰내용'] || ''} ${r['답변내용'] || ''} ${r['작성자'] || ''} ${r['제품명'] || ''}`.toLowerCase();
    if (q && !text.includes(q)) return false;
    return true;
  });

  document.getElementById('qna-count').textContent = `총 ${filtered.length}건`;
  const list = document.getElementById('qna-list');
  if (!filtered.length) {
    list.innerHTML = '<div class="empty">😔 조건에 맞는 QNA가 없습니다</div>';
    return;
  }

  list.innerHTML = filtered.slice(0, 200).map((r, idx) => {
    const isA = r['답변여부'] === '답변완료';
    const link = r['링크'] || '';
    const question = r['리뷰내용'] || '내용 없음';
    const answer = r['답변내용'] || '';
    const rawId = `raw-qna-${idx}`;
    return `<div class="r-item qna">
      <div class="r-meta">
        <span class="r-prod">${esc(r['제품명'] || '')}</span>
        <span class="r-author">${esc(r['작성자'] || '익명')}</span>
        <span class="r-date">${esc(r['작성일'] || '')}</span>
        <span class="pill ${isA ? 'p-pos' : 'p-neg'}">${isA ? '✅ 답변완료' : '⏳ 미답변'}</span>
        ${link ? `<a href="${esc(link)}" target="_blank" rel="noopener noreferrer" style="font-size:11px;color:var(--primary);text-decoration:none;margin-left:auto">🔗 원문</a>` : ''}
      </div>
      <div class="q-q">Q. ${esc(question)}</div>
      ${answer ? `<div class="q-a">A. ${esc(answer)}</div>` : '<div class="q-a">답변이 아직 등록되지 않았습니다.</div>'}
      <span class="raw-toggle" onclick="toggleRaw('${rawId}')">원본 데이터 보기</span>
      <div class="raw-box" id="${rawId}">${esc(JSON.stringify(r['원본'] || {}, null, 2))}</div>
    </div>`;
  }).join('') + (filtered.length > 200 ? `<div class="empty" style="padding:16px">상위 200건 표시 중 (전체 ${filtered.length}건)</div>` : '');
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-content').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(e=>e.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  if(btn) btn.classList.add('active');
}

renderKPI();
renderCharts();
renderProductTable();
populateFilters();
renderReviews();
renderQna();
renderRecentNeg();
</script>
</body>
</html>
