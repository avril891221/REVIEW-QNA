<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PASECO 리뷰 & QNA 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --primary:#2563eb;--primary-dark:#1d4ed8;--primary-light:#eff6ff;--primary-50:#dbeafe;
  --positive:#059669;--positive-light:#ecfdf5;--positive-50:#d1fae5;
  --negative:#dc2626;--negative-light:#fef2f2;--negative-50:#fee2e2;
  --neutral:#6b7280;--neutral-light:#f9fafb;--neutral-50:#f3f4f6;
  --qna:#7c3aed;--qna-light:#f5f3ff;--qna-50:#ede9fe;
  --warning:#d97706;--warning-light:#fffbeb;
  --border:#e5e7eb;--border-light:#f3f4f6;
  --text:#111827;--text-sub:#6b7280;--text-muted:#9ca3af;
  --bg:#f8fafc;--bg-white:#ffffff;
  --shadow-sm:0 1px 2px rgba(0,0,0,.05);
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08),0 8px 24px rgba(0,0,0,.06);
  --shadow-lg:0 8px 32px rgba(0,0,0,.12);
  --radius:16px;--radius-sm:10px;--radius-xs:8px;
  --transition:all .2s cubic-bezier(.4,0,.2,1);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}
header{background:var(--bg-white);border-bottom:1px solid var(--border);padding:0 40px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);background:rgba(255,255,255,.92);}
.header-inner{max-width:1440px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:64px;}
.logo{display:flex;align-items:center;gap:12px;}
.logo-badge{width:38px;height:38px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:900;color:white;font-size:16px;box-shadow:0 2px 8px rgba(37,99,235,.3);}
.logo-text{font-size:18px;font-weight:800;letter-spacing:-.3px;}
.logo-sub{font-size:12px;color:var(--text-sub);font-weight:500;}
.header-right{display:flex;align-items:center;gap:12px;}
.update-badge{font-size:12px;color:var(--text-sub);background:var(--neutral-light);padding:5px 14px;border-radius:20px;font-weight:500;}
.btn-export{padding:6px 16px;border-radius:8px;border:1px solid var(--border);background:white;font-size:12px;font-weight:600;cursor:pointer;color:var(--text);font-family:inherit;transition:var(--transition);}
.btn-export:hover{background:var(--primary);color:white;border-color:var(--primary);}
main{max-width:1440px;margin:0 auto;padding:28px 40px 60px;}
.tabs{display:flex;gap:4px;background:var(--bg-white);padding:5px;border-radius:12px;border:1px solid var(--border);width:fit-content;margin-bottom:24px;box-shadow:var(--shadow-sm);}
.tab-btn{padding:8px 20px;border-radius:8px;border:none;background:none;font-size:13px;font-weight:600;cursor:pointer;color:var(--text-sub);transition:var(--transition);font-family:inherit;white-space:nowrap;}
.tab-btn.active{background:var(--primary);color:white;box-shadow:0 2px 8px rgba(37,99,235,.25);}
.tab-btn:hover:not(.active){background:var(--primary-light);color:var(--primary);}
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:24px;}
.kpi-card{background:var(--bg-white);border-radius:var(--radius);padding:20px;border:1px solid var(--border);box-shadow:var(--shadow-sm);transition:var(--transition);position:relative;overflow:hidden;}
.kpi-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}
.kpi-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.kpi-card.k-blue::after{background:linear-gradient(90deg,var(--primary),#60a5fa);}
.kpi-card.k-yellow::after{background:linear-gradient(90deg,#f59e0b,#fbbf24);}
.kpi-card.k-green::after{background:linear-gradient(90deg,var(--positive),#34d399);}
.kpi-card.k-red::after{background:linear-gradient(90deg,var(--negative),#f87171);}
.kpi-card.k-purple::after{background:linear-gradient(90deg,var(--qna),#a78bfa);}
.kpi-label{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;}
.kpi-value{font-size:32px;font-weight:900;line-height:1;margin-bottom:6px;letter-spacing:-.5px;}
.c-blue{color:var(--primary);}.c-green{color:var(--positive);}.c-red{color:var(--negative);}.c-purple{color:var(--qna);}.c-yellow{color:var(--warning);}
.kpi-sub{font-size:12px;color:var(--text-sub);font-weight:500;}
.kpi-bar{height:4px;border-radius:4px;background:var(--border-light);margin-top:10px;overflow:hidden;}
.kpi-bar-fill{height:100%;border-radius:4px;transition:width .8s cubic-bezier(.4,0,.2,1);}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.grid-3{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:16px;}
.card{background:var(--bg-white);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow-sm);overflow:hidden;transition:var(--transition);}
.card:hover{box-shadow:var(--shadow);}
.card-header{padding:16px 20px 12px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.card-title{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;}
.card-body{padding:18px 20px;}
.chart-wrap{position:relative;height:220px;}
.tbl{width:100%;border-collapse:collapse;font-size:13px;}
.tbl th{text-align:left;padding:10px 14px;font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--border);background:var(--neutral-light);}
.tbl td{padding:12px 14px;border-bottom:1px solid var(--border-light);vertical-align:middle;}
.tbl tr:hover td{background:var(--neutral-light);}
.tbl tr:last-child td{border-bottom:none;}
.pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;gap:4px;}
.p-pos{background:var(--positive-50);color:var(--positive);}
.p-neg{background:var(--negative-50);color:var(--negative);}
.p-neu{background:var(--neutral-50);color:var(--neutral);}
.p-qna{background:var(--qna-50);color:var(--qna);}
.p-blue{background:var(--primary-50);color:var(--primary);}
.mbar-wrap{display:flex;align-items:center;gap:8px;font-size:12px;}
.mbar{flex:1;height:6px;border-radius:6px;background:var(--border-light);overflow:hidden;}
.mbar-fill{height:100%;border-radius:6px;transition:width .6s ease;}
.r-list{display:flex;flex-direction:column;gap:10px;}
.r-item{padding:16px 18px;border-radius:var(--radius-sm);border:1px solid var(--border);transition:var(--transition);background:var(--bg-white);}
.r-item:hover{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-light);}
.r-item.neg{border-left:3px solid var(--negative);}
.r-item.pos{border-left:3px solid var(--positive);}
.r-item.qna{border-left:3px solid var(--qna);}
.r-meta{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.r-author{font-size:13px;font-weight:600;}
.r-date{font-size:11px;color:var(--text-sub);font-weight:500;}
.r-prod{font-size:11px;font-weight:600;background:var(--primary-light);color:var(--primary);padding:2px 10px;border-radius:20px;}
.r-content{font-size:13px;line-height:1.75;color:#374151;white-space:pre-wrap;}
.r-link{font-size:11px;color:var(--primary);text-decoration:none;font-weight:600;transition:var(--transition);}
.r-link:hover{text-decoration:underline;}
.q-q{font-size:13px;font-weight:600;margin-bottom:8px;line-height:1.75;white-space:pre-wrap;color:var(--text);}
.q-a{font-size:12px;color:var(--text-sub);padding:10px 14px;border-left:3px solid var(--qna-50);margin-top:8px;line-height:1.7;white-space:pre-wrap;background:var(--qna-light);border-radius:0 8px 8px 0;}
.fbar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.fsel,.sinput,.fdate{padding:8px 14px;border-radius:var(--radius-xs);border:1px solid var(--border);font-size:13px;background:white;font-family:inherit;color:var(--text);transition:var(--transition);}
.sinput{width:220px;}
.fdate{width:140px;}
.fsel:focus,.sinput:focus,.fdate:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-light);}
.f-count{font-size:13px;color:var(--text-sub);margin-left:auto;font-weight:500;}
.sec-title{font-size:13px;font-weight:700;color:var(--text-sub);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border);}
.tab-content{display:none;}.tab-content.active{display:block;}
.empty{text-align:center;padding:40px;color:var(--text-sub);font-size:14px;}
.raw-toggle{cursor:pointer;font-size:12px;color:var(--primary);font-weight:600;margin-top:10px;display:inline-block;transition:var(--transition);}
.raw-toggle:hover{text-decoration:underline;}
.raw-box{display:none;margin-top:10px;padding:12px;border:1px dashed var(--border);border-radius:8px;background:var(--neutral-light);font-size:11px;line-height:1.6;white-space:pre-wrap;color:#374151;font-family:'SF Mono',Consolas,monospace;}
.pager{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:20px;flex-wrap:wrap;}
.pager-btn{padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:white;font-size:12px;font-weight:600;cursor:pointer;color:var(--text-sub);font-family:inherit;transition:var(--transition);}
.pager-btn:hover{background:var(--primary-light);color:var(--primary);border-color:var(--primary);}
.pager-btn.active{background:var(--primary);color:white;border-color:var(--primary);}
.pager-btn:disabled{opacity:.4;cursor:not-allowed;}
.pager-info{font-size:12px;color:var(--text-sub);padding:0 8px;}
.kw-cloud{display:flex;flex-wrap:wrap;gap:8px;padding:4px 0;}
.kw-tag{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;transition:var(--transition);user-select:none;}
.kw-tag:hover{transform:scale(1.08);box-shadow:0 2px 8px rgba(0,0,0,.12);}
.kw-tag:active{transform:scale(.96);}
.kw-neg{background:var(--negative-light);color:var(--negative);border:1px solid var(--negative-50);}
.kw-pos{background:var(--positive-light);color:var(--positive);border:1px solid var(--positive-50);}
.kw-all{background:var(--primary-light);color:var(--primary);border:1px solid var(--primary-50);}
/* period toggle buttons */
.period-toggle{display:inline-flex;gap:2px;background:var(--neutral-light);padding:3px;border-radius:8px;}
/* insight section */
.insight-section{margin-top:20px;}
.insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.insight-card{background:var(--bg-white);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow-sm);overflow:hidden;}
.insight-card.full{grid-column:1/-1;}
.insight-card-header{padding:14px 20px 10px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;gap:8px;}
.insight-card-header .ic-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.insight-card-header .ic-title{font-size:14px;font-weight:700;}
.insight-card-header .ic-sub{font-size:11px;color:var(--text-muted);margin-left:auto;}
.insight-card-body{padding:16px 20px;font-size:13px;line-height:1.8;color:#374151;}
.insight-card-body p{margin-bottom:10px;}
.insight-card-body p:last-child{margin-bottom:0;}
.insight-bullet{padding-left:16px;border-left:3px solid var(--primary-50);margin:10px 0;}
.insight-bullet.pos{border-left-color:var(--positive-50);}
.insight-bullet.neg{border-left-color:var(--negative-50);}
.insight-bullet.warn{border-left-color:#fbbf24;}
.kw-change{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700;margin:2px;}
.kw-up{background:#dcfce7;color:#16a34a;}
.kw-down{background:#fee2e2;color:#dc2626;}
.kw-new{background:#dbeafe;color:#2563eb;}
.kw-stable{background:#f3f4f6;color:#6b7280;}
.period-btn{padding:4px 12px;border-radius:6px;border:none;font-size:11px;font-weight:600;cursor:pointer;color:var(--text-sub);background:none;font-family:inherit;transition:var(--transition);}
.period-btn.active{background:white;color:var(--primary);box-shadow:var(--shadow-sm);}
.period-btn:hover:not(.active){color:var(--text);}
/* global date filter bar */
.global-date-bar{display:flex;align-items:center;gap:10px;margin-bottom:20px;padding:14px 18px;background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius-sm);box-shadow:var(--shadow-sm);flex-wrap:wrap;}
.global-date-bar label{font-size:12px;font-weight:700;color:var(--text-sub);text-transform:uppercase;letter-spacing:.5px;}
.date-preset{padding:5px 12px;border-radius:6px;border:1px solid var(--border);font-size:11px;font-weight:600;cursor:pointer;color:var(--text-sub);background:white;font-family:inherit;transition:var(--transition);}
.date-preset:hover,.date-preset.active{background:var(--primary);color:white;border-color:var(--primary);}
@media(max-width:1200px){.kpi-grid{grid-template-columns:repeat(3,1fr);}}
@media(max-width:900px){main{padding:20px 16px;}header{padding:0 16px;}.kpi-grid{grid-template-columns:repeat(2,1fr);}.grid-2,.grid-3{grid-template-columns:1fr;}#tab-keywords>div:first-child{grid-template-columns:1fr !important;}.insight-grid{grid-template-columns:1fr;}.sinput{width:100%;}.fbar{flex-direction:column;align-items:stretch;}.f-count{margin-left:0;text-align:right;}.tabs{overflow-x:auto;width:100%;}.global-date-bar{flex-direction:column;align-items:stretch;}}
@media(max-width:500px){.kpi-grid{grid-template-columns:1fr;}.kpi-value{font-size:28px;}}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-badge">P</div>
      <div><div class="logo-text">PASECO 리뷰 대시보드</div><div class="logo-sub">리뷰 &amp; QNA 통합 분석</div></div>
    </div>
    <div class="header-right">
      <div class="update-badge">🕐 2026-04-06 13:52 기준</div>
      <button class="btn-export" onclick="exportCSV()">📥 CSV 내보내기</button>
    </div>
  </div>
</header>
<main>
  <!-- ═══ 글로벌 기간 필터 ═══ -->
  <div class="global-date-bar">
    <label>📅 기간 설정</label>
    <input type="date" class="fdate" id="g-date-from" onchange="applyGlobalDate()">
    <span style="color:var(--text-muted)">~</span>
    <input type="date" class="fdate" id="g-date-to" onchange="applyGlobalDate()">
    <div style="display:flex;gap:4px;flex-wrap:wrap;">
      <button class="date-preset active" onclick="setPreset('all',this)">전체</button>
      <button class="date-preset" onclick="setPreset('7d',this)">7일</button>
      <button class="date-preset" onclick="setPreset('30d',this)">30일</button>
      <button class="date-preset" onclick="setPreset('90d',this)">90일</button>
      <button class="date-preset" onclick="setPreset('6m',this)">6개월</button>
      <button class="date-preset" onclick="setPreset('1y',this)">1년</button>
    </div>
    <span class="f-count" id="g-date-info"></span>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('overview',this)">📊 전체 현황</button>
    <button class="tab-btn" onclick="switchTab('products',this)">📦 제품별 분석</button>
    <button class="tab-btn" onclick="switchTab('reviews',this)">⭐ 리뷰 목록</button>
    <button class="tab-btn" onclick="switchTab('qna',this)">💬 QNA 목록</button>
    <button class="tab-btn" onclick="switchTab('keywords',this)">🔑 키워드 분석</button>
  </div>

  <!-- ═══ 전체 현황 ═══ -->
  <div id="tab-overview" class="tab-content active">
    <div class="kpi-grid" id="kpi-grid"></div>
    <div class="grid-2">
      <div class="card">
        <div class="card-header">
          <div class="card-title">📈 리뷰/QNA 추이</div>
          <div class="period-toggle">
            <button class="period-btn active" onclick="setTrendPeriod('day',this)">일별</button>
            <button class="period-btn" onclick="setTrendPeriod('week',this)">주별</button>
            <button class="period-btn" onclick="setTrendPeriod('month',this)">월별</button>
          </div>
        </div>
        <div class="card-body"><div class="chart-wrap" style="height:200px"><canvas id="trendChart"></canvas></div></div>
      </div>
      <div class="card"><div class="card-header"><div class="card-title">😊 감성 분포</div><span class="pill p-pos">리뷰</span></div><div class="card-body"><div class="chart-wrap"><canvas id="sentimentChart"></canvas></div></div></div>
    </div>
    <div class="grid-2">
      <div class="card"><div class="card-header"><div class="card-title">⭐ 별점 분포</div><span class="pill p-blue">리뷰</span></div><div class="card-body"><div class="chart-wrap"><canvas id="ratingChart"></canvas></div></div></div>
      <div class="card"><div class="card-header"><div class="card-title">📦 제품별 리뷰 수</div></div><div class="card-body"><div class="chart-wrap" style="height:280px"><canvas id="productChart"></canvas></div></div></div>
    </div>
    <div class="grid-3">
      <div class="card"><div class="card-header"><div class="card-title">💬 QNA 답변 현황</div><span class="pill p-qna">QNA</span></div><div class="card-body"><div class="chart-wrap"><canvas id="qnaChart"></canvas></div></div></div>
      <div class="card"><div class="card-header"><div class="card-title">📊 제품별 감성 비교</div></div><div class="card-body"><div class="chart-wrap" style="height:200px"><canvas id="sentimentByProduct"></canvas></div></div></div>
    </div>
    <div class="sec-title">🚨 최근 부정 리뷰 (최신 10건)</div>
    <div class="r-list" id="recent-neg"></div>
  </div>

  <!-- ═══ 제품별 분석 ═══ -->
  <div id="tab-products" class="tab-content">
    <div class="card">
      <div class="card-header"><div class="card-title">📊 제품별 상세 지표</div></div>
      <div style="overflow-x:auto;"><table class="tbl"><thead><tr><th>제품명</th><th>리뷰 수</th><th>평균 별점</th><th>긍정률</th><th>부정률</th><th>QNA 수</th><th>답변완료</th><th>최근 리뷰일</th></tr></thead><tbody id="prod-tbody"></tbody></table></div>
    </div>
    <div style="margin-top:20px;"><div class="grid-2">
      <div class="card"><div class="card-header"><div class="card-title">📈 제품별 평균 별점</div></div><div class="card-body"><div class="chart-wrap" style="height:280px"><canvas id="prodRatingChart"></canvas></div></div></div>
      <div class="card"><div class="card-header"><div class="card-title">📊 제품별 리뷰/QNA 비율</div></div><div class="card-body"><div class="chart-wrap" style="height:280px"><canvas id="prodDistChart"></canvas></div></div></div>
    </div></div>
  </div>

  <!-- ═══ 리뷰 목록 ═══ -->
  <div id="tab-reviews" class="tab-content">
    <div class="fbar">
      <select class="fsel" id="f-prod" onchange="renderReviews()"><option value="">전체 제품</option></select>
      <select class="fsel" id="f-sent" onchange="renderReviews()"><option value="">전체 감성</option><option value="긍정">😊 긍정</option><option value="부정">😞 부정</option><option value="중립">😐 중립</option></select>
      <select class="fsel" id="f-rat" onchange="renderReviews()"><option value="">전체 별점</option><option value="5">⭐5점</option><option value="4">⭐4점</option><option value="3">⭐3점</option><option value="2">⭐2점</option><option value="1">⭐1점</option></select>
      <input class="sinput" id="s-rev" placeholder="🔍 리뷰 검색..." oninput="renderReviews()">
      <span class="f-count" id="rev-count"></span>
    </div>
    <div class="r-list" id="rev-list"></div>
    <div class="pager" id="rev-pager"></div>
  </div>

  <!-- ═══ QNA 목록 ═══ -->
  <div id="tab-qna" class="tab-content">

function renderKPI() {
  const rv = getFilteredReviews(), qn = getFilteredQnas();
  const rats = rv.map(r=>parseFloat(r['별점'])).filter(n=>!isNaN(n)&&n>0);
  const avg = rats.length?(rats.reduce((a,b)=>a+b,0)/rats.length).toFixed(1):'—';
  const pos = rv.filter(r=>r['감성']==='긍정').length;
  const neg = rv.filter(r=>r['감성']==='부정').length;
  const posR = rv.length?Math.round(pos/rv.length*100):0;
  const negR = rv.length?Math.round(neg/rv.length*100):0;
  const ans = qn.filter(q=>q['답변여부']==='답변완료').length;
  const ansR = qn.length?Math.round(ans/qn.length*100):0;
  document.getElementById('kpi-grid').innerHTML = [
    kpi('전체 리뷰',rv.length+'건','c-blue','k-blue','수집된 전체 리뷰',100,'#2563eb'),
    kpi('평균 별점',avg+'점','c-yellow','k-yellow',rats.length+'건 집계',avg!=='—'?parseFloat(avg)/5*100:0,'#d97706'),
    kpi('긍정 비율',posR+'%','c-green','k-green',pos+'건 긍정',posR,'#059669'),
    kpi('부정 비율',negR+'%','c-red','k-red',neg+'건 부정',negR,'#dc2626'),
    kpi('QNA',qn.length+'건','c-purple','k-purple',ans+'건 답변완료 ('+ansR+'%)',ansR,'#7c3aed'),
  ].join('');
}
function kpi(l,v,c,k,s,p,col){return '<div class="kpi-card '+k+'"><div class="kpi-label">'+esc(l)+'</div><div class="kpi-value '+c+'">'+esc(v)+'</div><div class="kpi-sub">'+esc(s)+'</div><div class="kpi-bar"><div class="kpi-bar-fill" style="width:'+Math.min(p,100)+'%;background:'+col+'"></div></div></div>';}

function renderCharts() {

  const rCnts=[5,4,3,2,1].map(s=>rv.filter(r=>parseInt(r['별점'])===s).length);

/* 일별/주별/월별 추이 */
function setTrendPeriod(p, btn) {
  trendPeriod = p;
  document.querySelectorAll('.period-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  renderTrend();
}
function getWeekKey(dateStr) {
  const d = new Date(toISO(dateStr));
  if (isNaN(d)) return '';
  const day = d.getDay() || 7;
  d.setDate(d.getDate() + 4 - day);
  const yearStart = new Date(d.getFullYear(), 0, 1);
  const weekNo = Math.ceil(((d - yearStart) / 86400000 + 1) / 7);
  return d.getFullYear() + '-W' + String(weekNo).padStart(2,'0');
}
function getMonthKey(dateStr) {
  const iso = toISO(dateStr);
  return iso ? iso.slice(0,7) : '';
}
function renderTrend() {
  const rv = getFilteredReviews(), qn = getFilteredQnas();
  const map = {};
  const keyFn = trendPeriod==='week'?getWeekKey:trendPeriod==='month'?getMonthKey:(d=>toISO(d));
  rv.forEach(r=>{const k=keyFn(r['작성일']);if(!k)return;if(!map[k])map[k]={r:0,q:0};map[k].r++;});
  qn.forEach(r=>{const k=keyFn(r['작성일']);if(!k)return;if(!map[k])map[k]={r:0,q:0};map[k].q++;});
  const keys=Object.keys(map).sort();
  const ctx=document.getElementById('trendChart');
  if(!ctx)return;
  if(charts['trendChart'])charts['trendChart'].destroy();
  charts['trendChart']=new Chart(ctx,{
    type:'line',
    data:{labels:keys,datasets:[
      {label:'리뷰',data:keys.map(k=>map[k].r),borderColor:'#2563eb',backgroundColor:'rgba(37,99,235,.08)',fill:true,tension:.3,pointRadius:trendPeriod==='day'?1:3,borderWidth:2},
      {label:'QNA',data:keys.map(k=>map[k].q),borderColor:'#7c3aed',backgroundColor:'rgba(124,58,237,.08)',fill:true,tension:.3,pointRadius:trendPeriod==='day'?1:3,borderWidth:2}
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:{size:11},padding:10}}},
      scales:{x:{grid:{display:false},ticks:{font:{size:10},maxRotation:45,maxTicksLimit:20}},y:{grid:{color:'#f3f4f6'},beginAtZero:true,ticks:{font:{size:10}}}}}
  });
}

function renderPager(cid,total,cur,fn){
  const tp=Math.ceil(total/PER_PAGE),el=document.getElementById(cid);
  if(!el||tp<=1){if(el)el.innerHTML='';return;}
  let h='<button class="pager-btn" onclick="'+fn+'(1)" '+(cur===1?'disabled':'')+'>«</button>';
  h+='<button class="pager-btn" onclick="'+fn+'('+(cur-1)+')" '+(cur===1?'disabled':'')+'>‹</button>';
  const s=Math.max(1,cur-2),e=Math.min(tp,cur+2);
  for(let i=s;i<=e;i++) h+='<button class="pager-btn '+(i===cur?'active':'')+'" onclick="'+fn+'('+i+')">'+i+'</button>';
  h+='<span class="pager-info">/ '+tp+'</span>';
  h+='<button class="pager-btn" onclick="'+fn+'('+(cur+1)+')" '+(cur===tp?'disabled':'')+'>›</button>';
  h+='<button class="pager-btn" onclick="'+fn+'('+tp+')" '+(cur===tp?'disabled':'')+'>»</button>';
  el.innerHTML=h;
}

function renderReviews() {

   ═══════════════════════════════════════ */
function extractKeywords(texts,topN){
  const stop=new Set(['이','그','저','것','수','등','및','때','중','좀','더','잘','안','못','좋','는','을','를','에','의','가','은','과','와','도','로','에서','으로','하고','인데','되는','합니다','입니다','있는','없는','하는','같은','그런','이런','저런','해서','까지','부터','라서','니까','지만','ㅋㅋ','ㅎㅎ','해요','네요','거','건','게','데','듯','때문','하면','면','내용','펼치기','접기','가능','이미지','접고','펼치고','있어요','없어요','했는데','같아요','그리고','근데','아직','정말','진짜','너무','이번','구매','사용','배송','제품','주문','구입','정도','생각','리뷰','작성','상품']);
  const freq={};
  texts.forEach(t=>{if(!t)return;(t.match(/[가-힣]{2,}/g)||[]).forEach(w=>{if(!stop.has(w)&&w.length<=8)freq[w]=(freq[w]||0)+1;});});
  return Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,topN);
}
function renderKeywords(){
  const rv=getFilteredReviews();
  const allKw=extractKeywords(rv.map(r=>r['리뷰내용']),30);
  const posKw=extractKeywords(rv.filter(r=>r['감성']==='긍정').map(r=>r['리뷰내용']),20);
  const negKw=extractKeywords(rv.filter(r=>r['감성']==='부정').map(r=>r['리뷰내용']),20);
  const kwAll=document.getElementById('kw-all'),kwPos=document.getElementById('kw-pos'),kwNeg=document.getElementById('kw-neg');

  function kwHtml(list, cls) {
    if(!list.length) return '<div class="empty">키워드 데이터가 없습니다</div>';
    const mx=list[0][1];
    return list.map(([w,c])=>{
      const sz=12+Math.round(c/mx*8);
      return '<span class="kw-tag '+cls+'" style="font-size:'+sz+'px" title="'+c+'회 — 클릭하면 리뷰 목록으로 이동" onclick="jumpToReviewByKeyword(\''+esc(w)+'\')">'+esc(w)+' <small style="opacity:.6">'+c+'</small></span>';
    }).join('');
  }

  kwAll.innerHTML=kwHtml(allKw,'kw-all');
  kwPos.innerHTML=posKw.length?kwHtml(posKw,'kw-pos'):'<div class="empty">긍정 키워드가 없습니다</div>';
  kwNeg.innerHTML=negKw.length?kwHtml(negKw,'kw-neg'):'<div class="empty">부정 키워드가 없습니다</div>';

  /* 키워드 빈도 차트 — 무지개 색상 */
  const topKw=allKw.slice(0,15);
  if(topKw.length){
    const ctx=document.getElementById('kwChart');if(!ctx)return;
    if(charts['kwChart'])charts['kwChart'].destroy();
    charts['kwChart']=new Chart(ctx,{type:'bar',data:{labels:topKw.map(([w])=>w),datasets:[{data:topKw.map(([,c])=>c),backgroundColor:topKw.map((_,i)=>KW_COLORS[i%KW_COLORS.length]),borderRadius:6,barThickness:22}]},
      options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false}},
        scales:{x:{grid:{display:false},ticks:{font:{size:11}}},y:{grid:{color:'transparent'},ticks:{font:{size:12,weight:600}}}}}});
  }

  renderInsight(rv, allKw, posKw, negKw);
}

/* ═══════════════════════════════════════
   인사이트 분석 — 리뷰 본문 기반 심층 분석
   ═══════════════════════════════════════ */

/* 쇼핑몰 UI 잔여 텍스트 제거 */
function cleanReviewText(text) {
  if (!text) return '';
  return text
    .replace(/이미지\s*접고\s*펼치기\s*가능/g, '')
    .replace(/내용\s*펼치고\s*접기/g, '')
    .replace(/전용보관커버\s*선택[:\s]*\S*/g, '')
    .replace(/라이브혜택\s*\S*/g, '')
    .replace(/주거형태\s*\S*/g, '')
    .replace(/색상\s*(스노우\s*화이트|세피아\s*로즈|블랙|화이트)/g, '')
    .replace(/한달사용|재구매/g, '')
    .replace(/소음(작아요|보통이에요|커요)/g, (m) => {
      if (m.includes('작아요')) return '소음이 작습니다. ';
      if (m.includes('커요')) return '소음이 큽니다. ';
      return '소음은 보통입니다. ';
    })
    .replace(/\s+/g, ' ').trim();
}

/* 이슈 카테고리 정의 */
const ISSUE_CATEGORIES = {
  '소음': { keywords: ['소음', '시끄럽', '시끄러', '소리', '조용', '무소음', '정숙'], icon: '🔊',
    posContext: '정숙한 작동으로 만족', negContext: '소음이 기대 이하' },
  '바람/성능': { keywords: ['바람', '세기', '파워', '약하', '강하', '시원', '냉방', '쿨링', '선풍', '풍량'], icon: '💨',
    posContext: '바람 세기와 냉방 성능 만족', negContext: '바람 세기가 부족하거나 냉방 효과 미흡' },
  '내구성/품질': { keywords: ['내구성', '부실', '헐렁', '꺾', '고장', '하자', '불량', '고개', '꺽', '흔들', '망가', '내려'], icon: '🔧',
    posContext: '튼튼하고 오래 사용 가능', negContext: '내구성 또는 품질에 불만' },
  '설치': { keywords: ['설치', '자가설치', '이지핏', '창문', '창틀', '시공', '조립'], icon: '🪟',
    posContext: '설치가 쉽고 편리', negContext: '설치 과정의 어려움' },
  '휴대성/디자인': { keywords: ['가볍', '무게', '이쁘', '예쁘', '디자인', '폴딩', '접', '보관', '휴대', '컴팩트', '심플'], icon: '✨',
    posContext: '가볍고 디자인이 좋음', negContext: '무게 또는 디자인 불만' },
  '가격/가성비': { keywords: ['가격', '비싸', '비쌈', '가성비', '할인', '저렴', '라방', '세일'], icon: '💰',
    posContext: '가격 대비 만족', negContext: '가격 대비 불만족' },
  '배터리': { keywords: ['배터리', '충전', '방전', '사용시간', '오래가'], icon: '🔋',
    posContext: '배터리 지속 시간 만족', negContext: '배터리 관련 불만' },
  'AS/서비스': { keywords: ['수리', '교환', '반품', '배송', '포장', '고객', '센터', '대응'], icon: '📦',
    posContext: 'AS 및 배송 서비스 만족', negContext: 'AS나 배송에 불만' },
};

function renderInsight(rv, allKw, posKw, negKw) {
  const el = document.getElementById('insight-section');
  if (!el) return;
  if (rv.length < 3) { el.innerHTML = ''; return; }

  const posRv = rv.filter(r => r['감성'] === '긍정');
  const negRv = rv.filter(r => r['감성'] === '부정');

  /* ── 기간 정보 ── */
  const dates = rv.map(r => toISO(r['작성일'])).filter(Boolean).sort();
  const periodFrom = dates[0] || '', periodTo = dates[dates.length-1] || '';
  const periodDays = periodFrom && periodTo ? Math.max(1, Math.round((new Date(periodTo) - new Date(periodFrom)) / 86400000) + 1) : 0;
  const periodLabel = periodFrom ? periodFrom + ' ~ ' + periodTo + ' (' + periodDays + '일간)' : '전체 기간';

  /* ── 직전 동일 기간 ── */
  let prevRv = [];
  if (periodFrom && periodTo) {
    const fromD = new Date(periodFrom), toD = new Date(periodTo);
    const diff = toD - fromD;
    const prevTo = new Date(fromD.getTime() - 86400000);
    const prevFrom = new Date(prevTo.getTime() - diff);
    const pf = prevFrom.toISOString().slice(0,10), pt = prevTo.toISOString().slice(0,10);
    prevRv = RAW.filter(r => r['구분']==='REVIEW' && (() => { const d = toISO(r['작성일']); return d && d >= pf && d <= pt; })());
  }
  const hasPrev = prevRv.length > 0;

  /* ── 통계 ── */
  const totalR = rv.length, posCount = posRv.length, negCount = negRv.length;
  const posRate = totalR ? Math.round(posCount/totalR*100) : 0;
  const negRate = totalR ? Math.round(negCount/totalR*100) : 0;
  const rats = rv.map(r=>parseFloat(r['별점'])).filter(n=>!isNaN(n)&&n>0);
  const avgRat = rats.length ? (rats.reduce((a,b)=>a+b,0)/rats.length).toFixed(1) : '—';

  let prevPosRate = 0, prevNegRate = 0;
  if (hasPrev) {
    prevPosRate = prevRv.length ? Math.round(prevRv.filter(r=>r['감성']==='긍정').length/prevRv.length*100) : 0;
    prevNegRate = prevRv.length ? Math.round(prevRv.filter(r=>r['감성']==='부정').length/prevRv.length*100) : 0;
  }

  /* ── 이슈 카테고리별 분류 ── */
  function classifyByIssue(reviewList) {
    const result = {};
    for (const [cat, cfg] of Object.entries(ISSUE_CATEGORIES)) {
      const matched = reviewList.filter(r => {
        const t = cleanReviewText(r['리뷰내용']);
        return cfg.keywords.some(k => t.includes(k));
      });
      if (matched.length > 0) {
        /* 대표 리뷰 발췌 (가장 내용이 긴 것) */
        const sorted = [...matched].sort((a,b) => cleanReviewText(b['리뷰내용']).length - cleanReviewText(a['리뷰내용']).length);
        const excerpts = sorted.slice(0,3).map(r => {
          const clean = cleanReviewText(r['리뷰내용']);
          return { product: r['제품명'], text: clean.length > 120 ? clean.slice(0,120)+'…' : clean, rating: r['별점'] };
        });
        /* 관련 제품 분포 */
        const prodCount = {};
        matched.forEach(r => { const p = r['제품명']; if(p) prodCount[p] = (prodCount[p]||0) + 1; });
        result[cat] = { count: matched.length, excerpts, prodCount, icon: cfg.icon, posCtx: cfg.posContext, negCtx: cfg.negContext };
      }
    }
    return result;
  }

  const negIssues = classifyByIssue(negRv);
  const posIssues = classifyByIssue(posRv);

  /* ── 직전 기간 이슈 (변화 감지용) ── */
  const prevNegRv = hasPrev ? prevRv.filter(r => r['감성'] === '부정') : [];
  const prevNegIssues = hasPrev ? classifyByIssue(prevNegRv) : {};

  /* ── HTML 조립 ── */
  let h = '<div class="sec-title" style="margin-top:24px;">💡 소비자 트렌드 인사이트</div>';
  h += '<div class="insight-grid">';

  /* ═══ 카드 1: 현황 요약 ═══ */
  h += '<div class="insight-card"><div class="insight-card-header"><div class="ic-icon" style="background:var(--primary-light)">📊</div><div><div class="ic-title">종합 현황</div></div><div class="ic-sub">'+esc(periodLabel)+'</div></div><div class="insight-card-body">';
  h += '<p>해당 기간 총 <strong>'+totalR+'건</strong> 리뷰, 평균 <strong>'+avgRat+'점</strong>, 긍정 <strong>'+posRate+'%</strong> / 부정 <strong>'+negRate+'%</strong>.</p>';
  if (hasPrev) {
    const posDiff = posRate - prevPosRate, negDiff = negRate - prevNegRate;
    h += '<p>직전 동일 기간('+prevRv.length+'건) 대비 ';
    if (posDiff > 0) h += '긍정률 <span style="color:var(--positive)">▲'+posDiff+'%p 개선</span>, ';
    else if (posDiff < 0) h += '긍정률 <span style="color:var(--negative)">▼'+Math.abs(posDiff)+'%p 하락</span>, ';
    if (negDiff > 0) h += '부정률 <span style="color:var(--negative)">▲'+negDiff+'%p 증가</span>.';
    else if (negDiff < 0) h += '부정률 <span style="color:var(--positive)">▼'+Math.abs(negDiff)+'%p 감소</span>.';
    else h += '큰 변화 없이 유지.';
    h += '</p>';
  }
  h += '</div></div>';

  /* ═══ 카드 2: 긍정 트렌드 — 강점 분석 ═══ */
  h += '<div class="insight-card"><div class="insight-card-header"><div class="ic-icon" style="background:var(--positive-light)">😊</div><div><div class="ic-title">소비자가 만족하는 점</div></div><div class="ic-sub">긍정 리뷰 '+posCount+'건 분석</div></div><div class="insight-card-body">';
  const posIssuesSorted = Object.entries(posIssues).sort((a,b) => b[1].count - a[1].count);
  if (posIssuesSorted.length) {
    posIssuesSorted.forEach(([cat, info]) => {
      const prods = Object.entries(info.prodCount).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([p,c])=>p+'('+c+')').join(', ');
      h += '<div class="insight-bullet pos">';
      h += '<strong>'+info.icon+' '+esc(cat)+' ('+info.count+'건)</strong> — '+esc(info.posCtx)+'<br>';
      h += '<span style="color:var(--text-sub);font-size:12px">주요 제품: '+esc(prods)+'</span><br>';
      h += '<span style="color:#374151;font-size:12px;font-style:italic">"'+esc(info.excerpts[0].text)+'"</span>';
      h += '</div>';
    });
    h += '<p style="margin-top:12px"><strong>💡 유지 전략:</strong> ';
    const topPos = posIssuesSorted.slice(0,3);
    h += topPos.map(([cat, info]) => {
      if (cat === '소음') return '<strong>정숙성</strong>은 경쟁 우위 요소입니다. 마케팅에서 "저소음" 포인트를 강조하세요';
      if (cat === '휴대성/디자인') return '<strong>휴대성과 디자인</strong>이 핵심 구매 이유입니다. 폴딩/수납 편의성을 콘텐츠로 적극 노출하세요';
      if (cat === '바람/성능') return '<strong>냉방 성능</strong>에 대한 만족도가 높습니다. 성능 비교 콘텐츠를 제작하세요';
      if (cat === '배터리') return '<strong>배터리 성능</strong>이 좋은 평가를 받고 있습니다. 사용 시간 관련 실사용 후기를 활용하세요';
      if (cat === '가격/가성비') return '<strong>가성비</strong>에 대한 만족감이 높습니다. 경쟁사 대비 가치를 어필하세요';
      return '<strong>'+cat+'</strong> 관련 강점을 유지하세요';
    }).join('. ') + '.</p>';
  } else {
    h += '<p>해당 기간에 분류 가능한 긍정 리뷰가 부족합니다.</p>';
  }
  h += '</div></div>';

  /* ═══ 카드 3: 부정 트렌드 — 개선 필요 사항 ═══ */
  h += '<div class="insight-card"><div class="insight-card-header"><div class="ic-icon" style="background:var(--negative-light)">😞</div><div><div class="ic-title">소비자 불만 및 개선 필요 사항</div></div><div class="ic-sub">부정 리뷰 '+negCount+'건 분석</div></div><div class="insight-card-body">';
  const negIssuesSorted = Object.entries(negIssues).sort((a,b) => b[1].count - a[1].count);
  if (negIssuesSorted.length) {
    negIssuesSorted.forEach(([cat, info]) => {
      const prods = Object.entries(info.prodCount).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([p,c])=>p+'('+c+')').join(', ');
      const prevCount = prevNegIssues[cat] ? prevNegIssues[cat].count : 0;
      let trend = '';
      if (hasPrev) {
        if (info.count > prevCount * 1.3 && prevCount > 0) trend = ' <span style="color:var(--negative);font-size:11px">▲ 증가 추세</span>';
        else if (info.count < prevCount * 0.7 && prevCount > 0) trend = ' <span style="color:var(--positive);font-size:11px">▼ 감소 추세</span>';
        else if (prevCount === 0 && info.count > 0) trend = ' <span style="color:var(--negative);font-size:11px">🆕 신규 이슈</span>';
      }
      h += '<div class="insight-bullet neg">';
      h += '<strong>'+info.icon+' '+esc(cat)+' ('+info.count+'건)'+trend+'</strong><br>';
      h += '<span style="color:var(--text-sub);font-size:12px">해당 제품: '+esc(prods)+'</span><br>';
      info.excerpts.forEach(ex => {
        h += '<span style="color:#374151;font-size:12px;font-style:italic;display:block;margin:3px 0">"'+esc(ex.text)+'" <span style="color:var(--text-muted)">— '+esc(ex.product)+'</span></span>';
      });
      h += '</div>';
    });

    h += '<p style="margin-top:14px"><strong>🔧 개선 제안:</strong></p>';
    negIssuesSorted.forEach(([cat, info]) => {
      const topProd = Object.entries(info.prodCount).sort((a,b)=>b[1]-a[1])[0];
      h += '<div class="insight-bullet warn" style="font-size:12px">';
      if (cat === '소음') {
        h += '<strong>소음 개선 ('+esc(topProd[0])+' 우선):</strong> 회전부/모터 소음 테스트를 강화하고, QC 기준을 재검토하세요. 회전 시 "딱딱" 소리는 조립 공차 문제일 수 있습니다. 리뷰 답변 시 소음 기준(dB)을 안내하면 기대치 관리에 도움됩니다.';
      } else if (cat === '내구성/품질') {
        h += '<strong>내구성 개선 ('+esc(topProd[0])+' 우선):</strong> 높이 고정부/목 관절의 내구성을 강화하세요. "시간이 지나면 스르르 내려간다"는 반복 불만이므로 잠금 메커니즘 재설계를 검토하세요.';
      } else if (cat === '설치') {
        h += '<strong>설치 편의 개선 ('+esc(topProd[0])+' 우선):</strong> 설치 가이드 영상을 제작하고, 다양한 창문 타입별 설치 방법을 상세히 안내하세요. "이지핏" 호환성 정보를 상품 페이지에 더 명확히 표시하세요.';
      } else if (cat === '바람/성능') {
        h += '<strong>성능 인식 개선 ('+esc(topProd[0])+' 우선):</strong> 풍량이 약하다는 피드백이 있습니다. 경쟁 제품 대비 성능 비교 데이터를 제공하거나, 올바른 사용법(거리/각도)을 안내해 기대치를 조정하세요.';
      } else if (cat === '가격/가성비') {
        h += '<strong>가격 정책 검토:</strong> 라이브방송 후 추가 할인에 대한 불만이 있습니다. 가격 변동 시 기존 구매자 대상 보상 정책(적립금 등)을 마련하면 신뢰도를 유지할 수 있습니다.';
      } else if (cat === 'AS/서비스') {
        h += '<strong>서비스 품질 개선:</strong> 포장 품질과 AS 접근성을 재점검하세요. 고가 전자제품에 맞는 포장 기준을 적용하고, AS 접수 프로세스를 간소화하세요.';
      } else if (cat === '배터리') {
        h += '<strong>배터리 관련 개선 ('+esc(topProd[0])+' 우선):</strong> 실사용 시간에 대한 정확한 정보를 제공하고, 충전 시간 대비 사용 시간 비율을 개선하세요.';
      } else {
        h += '<strong>'+esc(cat)+' 관련:</strong> '+esc(topProd[0])+' 제품의 관련 불만을 우선 검토하고 개선 방안을 마련하세요.';
      }
      h += '</div>';
    });
  } else {
    h += '<p>해당 기간에 부정 리뷰가 없습니다! 현재 제품 품질과 서비스가 잘 유지되고 있습니다. 👏</p>';
  }
  h += '</div></div>';

  /* ═══ 카드 4: 전략 방향 (full width) ═══ */
  h += '<div class="insight-card full"><div class="insight-card-header"><div class="ic-icon" style="background:#fffbeb">🧭</div><div><div class="ic-title">종합 전략 방향</div></div></div><div class="insight-card-body">';

  /* 제품별 종합 진단 */
  const prods = [...new Set(rv.map(r=>r['제품명']).filter(Boolean))];
  const prodDiag = prods.map(p => {
    const pr = rv.filter(r=>r['제품명']===p);
    const pPos = pr.filter(r=>r['감성']==='긍정').length;
    const pNeg = pr.filter(r=>r['감성']==='부정').length;
    const pRate = pr.length ? Math.round(pPos/pr.length*100) : 0;
    const pRats = pr.map(r=>parseFloat(r['별점'])).filter(n=>!isNaN(n)&&n>0);
    const pAvg = pRats.length ? (pRats.reduce((a,b)=>a+b,0)/pRats.length).toFixed(1) : '—';
    return { name: p, total: pr.length, posRate: pRate, negCount: pNeg, avgRat: pAvg };
  }).sort((a,b) => b.total - a.total);

  if (prodDiag.length) {
    h += '<p><strong>제품별 진단:</strong></p>';
    prodDiag.slice(0,6).forEach(pd => {
      const status = pd.posRate >= 90 ? '🟢' : pd.posRate >= 70 ? '🟡' : '🔴';
      h += '<div class="insight-bullet" style="font-size:12px">';
      h += status + ' <strong>' + esc(pd.name) + '</strong> — ';
      h += '리뷰 '+pd.total+'건, 평균 '+pd.avgRat+'점, 긍정률 '+pd.posRate+'%';
      if (pd.negCount > 0) h += ', 부정 '+pd.negCount+'건';
      if (pd.posRate >= 90) h += ' → <span style="color:var(--positive)">우수. 현행 유지하며 리뷰 수 확대에 집중</span>';
      else if (pd.posRate >= 70) h += ' → <span style="color:var(--warning)">양호. 부정 리뷰 원인을 파악해 90%대 진입 목표</span>';
      else if (pd.total > 0) h += ' → <span style="color:var(--negative)">주의. 제품 품질 및 고객 응대 긴급 점검 필요</span>';
      h += '</div>';
    });
  }

  /* 최종 요약 */
  h += '<div style="margin-top:16px;padding:14px 18px;background:var(--primary-light);border-radius:10px;font-size:13px;line-height:1.8">';
  h += '<strong>📌 핵심 요약:</strong><br>';
  if (posIssuesSorted.length) {
    h += '• <strong>강점:</strong> ' + posIssuesSorted.slice(0,3).map(([c,i])=>c+'('+i.count+'건)').join(', ') + '이(가) 주요 만족 요인입니다. 마케팅 소재로 활용하세요.<br>';
  }
  if (negIssuesSorted.length) {
    h += '• <strong>약점:</strong> ' + negIssuesSorted.slice(0,3).map(([c,i])=>c+'('+i.count+'건)').join(', ') + '이(가) 핵심 불만입니다. 우선순위로 개선하세요.<br>';
    const urgent = negIssuesSorted.find(([,i]) => {
      const pc = prevNegIssues[negIssuesSorted[0][0]];
      return pc && i.count > pc.count * 1.3;
    });
    if (urgent) h += '• <strong>⚠️ 긴급:</strong> "'+urgent[0]+'" 관련 불만이 증가 추세입니다. 즉각 대응이 필요합니다.<br>';
  }
  if (negCount === 0) {
    h += '• 해당 기간 부정 리뷰가 없는 <strong>매우 우수한</strong> 상태입니다. 현재 품질을 유지하면서 리뷰 수를 늘리는 데 집중하세요.<br>';
  }
  h += '</div>';

  h += '</div></div>'; // card body + card
  h += '</div>'; // insight-grid

  el.innerHTML = h;
}

/* 키워드 클릭 → 리뷰 목록 탭으로 이동 + 검색어 설정 */
function jumpToReviewByKeyword(word) {
  /* 리뷰 탭으로 전환 */
  switchTab('reviews', document.querySelectorAll('.tab-btn')[2]);
  /* 검색창에 키워드 입력 */
  const searchInput = document.getElementById('s-rev');
  searchInput.value = word;
  /* 필터 초기화 (제품/감성/별점) */
  document.getElementById('f-prod').value = '';
  document.getElementById('f-sent').value = '';
  document.getElementById('f-rat').value = '';
  /* 리뷰 렌더링 */
  renderReviews();
  /* 상단으로 스크롤 */
  window.scrollTo({top: 0, behavior: 'smooth'});
}

/* ═══════════════════════════════════════
   CSV 내보내기
   ═══════════════════════════════════════ */
function exportCSV(){
  const headers=['구분','제품명','작성자','작성일','별점','감성','리뷰내용','답변내용','답변여부','링크'];
  const rows=[headers.join(',')];
  getFilteredData().forEach(r=>{rows.push(headers.map(h=>{let v=String(r[h]||'').replace(/"/g,'""');return '"'+v+'"';}).join(','));});
  const blob=new Blob(['\uFEFF'+rows.join('\n')],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download='paseco_dashboard_'+new Date().toISOString().slice(0,10)+'.csv';a.click();URL.revokeObjectURL(url);
}

/* ═══════════════════════════════════════
   탭 전환 & 초기화
   ═══════════════════════════════════════ */
function switchTab(tab,btn){
  document.querySelectorAll('.tab-content').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(e=>e.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  if(btn)btn.classList.add('active');
}

/* 초기화 */
populateFilters();
refreshAll();
</script>
